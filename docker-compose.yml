services:
  qt-engine:
    build: .
    command: uv run --no-sync uvicorn src.services.generator.main:app --host 0.0.0.0 --port ${GENERATOR_PORT:-8004} --reload
    ports:
      - "${GENERATOR_PORT:-8004}:${GENERATOR_PORT:-8004}"
    environment:
      - SERVICE_PORT=${GENERATOR_PORT:-8004}
      - QT_INTERNAL_API_KEY=${QT_INTERNAL_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PRIMARY_GENERATOR=${PRIMARY_GENERATOR}
      - FALLBACK_GENERATOR=${FALLBACK_GENERATOR}
    networks:
      - qgen_network

  docs:
    build: .
    command: uv run --no-sync mkdocs serve --dev-addr 0.0.0.0:8005
    ports:
      - "8005:8005"
    volumes:
      - ./docs:/app/docs
      - ./mkdocs.yml:/app/mkdocs.yml
    networks:
      - qgen_network

networks:
  qgen_network:
    driver: bridge
